<style>
  /* Desktop defaults */
  .link-preview { border-radius:8px; box-shadow:0 2px 8px #0001; padding:1em; background:#232b37; color:#fff; max-width:600px; margin:1em 0; }
  .link-preview .lp-row { display:flex; align-items:flex-start; gap:12px; }
  .link-preview img { width:72px; height:72px; flex:0 0 auto; border-radius:6px; }
  .link-preview .lp-title { font-weight:700; font-size:1.1em; line-height:1.2; margin:0 0 0.3em 0; }
  .link-preview .lp-desc { font-size:0.95em; opacity:0.85; margin:0.2em 0 0.5em 0; }
  .link-preview a { color:#8ecae6; text-decoration:none; word-break:break-word; }

  /* Mobile tweaks */
  @media (max-width: 480px) {
    .link-preview { padding:0.75em; border-radius:6px; }
    .link-preview .lp-row { gap:8px; }
    .link-preview img { width:40px; height:40px; margin-top:2px; }
    .link-preview .lp-title { font-size:1em; line-height:1.15; }
    .link-preview .lp-desc { font-size:0.85em; line-height:1.3; margin:0.2em 0 0.4em 0; display:-webkit-box; -webkit-line-clamp:2; line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .link-preview a { font-size:0.85em; }
  }
</style>

<div class="link-preview">
  <div class="lp-row">
    <img src="{{ .Get "favicon" }}" alt="favicon" onerror="this.style.display='none';">
    <div>
      <div class="lp-title">{{ .Get "title" }}</div>
      <div class="lp-desc">{{ .Get "description" }}</div>
      <a href="{{ .Get "url" }}">{{ .Get "url" }}</a>
    </div>
  </div>
</div>
